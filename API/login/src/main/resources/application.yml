# File: src/main/resources/application.yml
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_db
    username: root
    password: Ganesharany@6
    driver-class-name: com.mysql.cj.jdbc.Driver
    dialect: org.hibernate.dialect.MySQL8Dialect
    hikari:
      maximum-pool-size: 10  # Configure max pool size if using HikariCP
    jpa:
      hibernate:
        ddl-auto: update  # Options are: none, update, create, create-drop
      show-sql: true       # Show SQL queries in the logs
      properties:
        hibernate:
          format_sql: true  # Formats SQL for better readability
      open-in-view: false  # Controls whether the session remains open after the view is rendered

    h2:
      console:
        enabled: true  # Enable H2 console if you're using H2 database (for debugging)

